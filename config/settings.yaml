# =============================================================
# Road Sign Detector — Konfiguracja
# =============================================================

project:
  name: "road_sign_detector"
  version: "1.0.0"

data:
  source_dir:   "data/raw"              # dane FiftyOne: raw/train/, raw/validation/
  data_dir:     "data/prepared"         # dane YOLO (generowane przez --prepare)
  images_dir:   "data/prepared/images"
  labels_dir:   "data/prepared/labels"
  dataset_yaml: "data/prepared/dataset.yaml"
  train_split:  0.8
  val_split:    0.1
  test_split:   0.1

model:
  architecture:   "yolov8n"             # n / s / m / l / x
  pretrained:     true
  device:         "0"                   # "0" = GPU, "cpu" = procesor
  cuda_version:   "13.0"
  imgsz:          640
  epochs:         50
  batch:          16                    # auto-dostosowywany do VRAM
  patience:       10
  workers:        8
  amp:            true                  # FP16 — tylko GPU, auto-wyłączane na cpu
  conf_threshold: 0.25
  iou_threshold:  0.45
  output_dir:     "runs"                # YOLOv8 zapisuje tu swoje wyniki
  model_path:     "runs/road_signs/weights/best.pt"   # tylko do inferencji

inference:
  conf:         0.25
  iou:          0.45
  save_results: true
  show_labels:  true
  show_conf:    true
  line_width:   2

logging:
  level:    "INFO"
  log_file: "logs/training.log"